<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Phoenix GPT v3</title>

  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Phoenix GPT v3 AI Assistant App" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">🔥</div>
        <div>
          <h2>Phoenix GPT</h2>
          <p>Version 3 App</p>
        </div>
      </div>

      <button class="side-btn primary" onclick="createNewConversation()">+ New Chat</button>
      <button class="side-btn" onclick="saveApiKey()">🔑 API Key</button>
      <button class="side-btn" onclick="toggleTheme()">🌗 Theme</button>
      <button class="side-btn" onclick="downloadChat()">⬇ Download Chat</button>
      <button class="side-btn danger" onclick="clearCurrentChat()">🗑 Clear Current Chat</button>

      <h3>Chat History</h3>
      <div id="conversationList"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div>
          <h1>Phoenix GPT v3</h1>
          <p>Streaming • Markdown • Voice • App Mode</p>
        </div>
      </header>

      <section id="chatBox" class="chat-box">
        <div class="message bot">
          <div class="avatar">🤖</div>
          <div class="bubble">
            <b>Phoenix GPT</b>
            <p>Hello Vanshika 👋 I am Phoenix GPT v3 App. Ask me anything.</p>
          </div>
        </div>
      </section>

      <div id="thinking" class="thinking hidden">
        🧠 Thinking <span></span><span></span><span></span>
      </div>

      <div class="quick">
        <button onclick="quickPrompt('Explain this in simple words: ')">Explain</button>
        <button onclick="quickPrompt('Create full website code for: ')">Website Code</button>
        <button onclick="quickPrompt('Write a professional caption for: ')">Caption</button>
        <button onclick="quickPrompt('Summarize this clearly: ')">Summarize</button>
        <button onclick="quickPrompt('Create a project report for: ')">Report</button>
      </div>

      <div class="composer">
        <input type="file" id="fileInput" />

        <div class="input-row">
          <button onclick="startVoice()" title="Voice Input">🎤</button>
          <textarea id="userInput" placeholder="Message Phoenix GPT v3..."></textarea>
          <button class="send" onclick="sendMessage()">➤</button>
        </div>

        <div class="actions">
          <button onclick="regenerate()">🔁 Regenerate</button>
          <button onclick="copyLastAnswer()">📋 Copy Last</button>
          <button onclick="speakLastAnswer()">🔊 Speak</button>
          <button onclick="stopSpeaking()">⏹ Stop</button>
        </div>
      </div>
    </main>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("service-worker.js")
          .then(function() {
            console.log("Phoenix GPT Service Worker Registered");
          })
          .catch(function(error) {
            console.log("Service Worker Error:", error);
          });
      });
    }
  </script>
</body>
    </html>
